<h1 class="titulo">Mensajes</h1>
<hr />

<div class="chat-card">
  <div id="chat-mensajes" class="chat-mensajes">
    <div class="mensaje" *ngFor="let msg of mensajes">
      <span class="autor">{{ msg.de }}:</span>
      <span class="cuerpo">{{ msg.cuerpo }}</span>
    </div>
  </div>

  <form (ngSubmit)="enviar()" class="chat-form">
    <input
      type="text"
      [(ngModel)]="texto"
      class="chat-input"
      name="texto"
      placeholder="Escribe un mensaje..."
      autofocus
      autocomplete="off"
    />
    <button type="submit" class="chat-btn">Enviar</button>
  </form>
</div>
